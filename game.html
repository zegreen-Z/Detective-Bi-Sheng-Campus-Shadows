<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侦探生存模拟器 v5.0 | Detective Survival Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3a;
  --text:#d4d4dc;--text-dim:#6a6a7a;--text-bright:#f0f0f8;
  --red:#c0392b;--red-glow:#e74c3c;--green:#27ae60;--green-glow:#2ecc71;
  --yellow:#d4a017;--yellow-glow:#f1c40f;--cyan:#2471a3;--cyan-glow:#3498db;
  --purple:#6c3483;--purple-glow:#8e44ad;--hp-red:#c0392b;
  --radius:8px;--font:'Segoe UI','Microsoft YaHei','PingFang SC',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
#app{max-width:800px;margin:0 auto;padding:20px;min-height:100vh;position:relative}
.title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;animation:fadeIn 1s}
.title-screen h1{font-size:2.4em;color:var(--red-glow);text-shadow:0 0 30px rgba(231,76,60,0.4);margin-bottom:8px;letter-spacing:4px}
.title-screen .subtitle{color:var(--text-dim);font-size:1em;margin-bottom:60px;letter-spacing:2px}
.title-btn{display:block;width:260px;padding:14px 0;margin:10px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1.05em;cursor:pointer;transition:all .3s;letter-spacing:2px}
.title-btn:hover{background:var(--surface2);border-color:var(--red);color:var(--red-glow);transform:translateY(-2px);box-shadow:0 4px 20px rgba(231,76,60,0.15)}
.title-btn.primary{border-color:var(--red);color:var(--red-glow)}
.char-select{animation:fadeIn .6s}
.char-select h2{text-align:center;color:var(--text-bright);margin-bottom:30px;font-size:1.4em}
.char-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;cursor:pointer;transition:all .3s}
.char-card:hover{border-color:var(--cyan-glow);transform:translateY(-2px);box-shadow:0 4px 20px rgba(52,152,219,0.15)}
.char-card.selected{border-color:var(--green-glow);box-shadow:0 0 20px rgba(46,204,113,0.2)}
.char-name{font-size:1.3em;color:var(--text-bright);margin-bottom:4px}
.char-type{color:var(--cyan-glow);font-size:.85em;margin-bottom:12px}
.char-desc{color:var(--text-dim);font-size:.9em;margin-bottom:16px;line-height:1.5}
.stat-row{display:flex;gap:12px;flex-wrap:wrap}
.stat-badge{background:var(--surface2);border-radius:4px;padding:4px 10px;font-size:.85em;display:flex;align-items:center;gap:4px}
.stat-badge .label{color:var(--text-dim)}
.stat-badge .val{color:var(--text-bright);font-weight:bold}
.stat-badge.hp .val{color:var(--red-glow)}
.stat-badge.int .val{color:var(--cyan-glow)}
.stat-badge.phy .val{color:var(--green-glow)}
.stat-badge.pres .val{color:var(--yellow-glow)}
.stat-badge.luck .val{color:var(--purple-glow)}
.confirm-btn{display:block;width:200px;margin:24px auto 0;padding:12px;background:var(--red);border:none;border-radius:var(--radius);color:#fff;font-size:1.05em;cursor:pointer;transition:all .3s;opacity:0.3;pointer-events:none}
.confirm-btn.active{opacity:1;pointer-events:auto}
.confirm-btn.active:hover{background:var(--red-glow);transform:translateY(-2px)}
.game-layout{animation:fadeIn .4s}
.stats-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.player-name{font-size:1.1em;color:var(--text-bright);font-weight:bold}
.hp-bar-container{display:flex;align-items:center;gap:8px}
.hp-bar{width:160px;height:14px;background:var(--surface2);border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,var(--hp-red),var(--red-glow));transition:width .5s;border-radius:7px}
.hp-text{color:var(--red-glow);font-size:.9em;font-weight:bold;min-width:50px}
.mini-stats{display:flex;gap:8px;flex-wrap:wrap}
.mini-stat{background:var(--surface2);border-radius:4px;padding:3px 8px;font-size:.8em}
.mini-stat .l{color:var(--text-dim)}
.mini-stat .v{color:var(--text-bright);font-weight:bold;margin-left:2px}
.chapter-title{background:linear-gradient(135deg,rgba(192,57,43,0.1),rgba(108,52,131,0.1));border:1px solid rgba(192,57,43,0.2);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;text-align:center}
.chapter-title h2{color:var(--red-glow);font-size:1.2em;letter-spacing:2px}
.story-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;min-height:200px}
.story-title{color:var(--yellow-glow);font-size:1.1em;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.story-text{color:var(--text);line-height:1.9;font-size:1em;white-space:pre-line}
.story-text.typing{border-right:2px solid var(--text-dim);animation:blink .8s infinite}
@keyframes blink{0%,100%{border-color:var(--text-dim)}50%{border-color:transparent}}
.clue-popup{background:rgba(212,160,23,0.1);border:1px solid rgba(212,160,23,0.3);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;animation:slideIn .4s;display:flex;align-items:center;gap:8px}
.clue-popup .icon{font-size:1.2em}
.clue-popup .text{color:var(--yellow-glow);font-size:.9em}
.stat-change{background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:var(--radius);padding:10px 16px;margin-bottom:8px;animation:slideIn .3s;color:var(--green-glow);font-size:.9em}
.stat-change.negative{background:rgba(192,57,43,0.1);border-color:rgba(192,57,43,0.3);color:var(--red-glow)}
.choices{margin-bottom:16px}
.choice-btn{display:block;width:100%;padding:14px 18px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.95em;text-align:left;cursor:pointer;transition:all .3s;line-height:1.5}
.choice-btn:hover:not(.locked){background:var(--surface2);border-color:var(--cyan-glow);transform:translateX(4px);box-shadow:0 2px 12px rgba(52,152,219,0.1)}
.choice-btn.locked{opacity:0.4;cursor:not-allowed}
.choice-btn .req{display:block;font-size:.8em;color:var(--yellow-glow);margin-top:4px}
.choice-btn .req.fail{color:var(--red-glow)}
.choice-btn.locked .req{color:var(--text-dim)}
.check-result{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;text-align:center;animation:fadeIn .5s}
.check-result.success{border-color:var(--green-glow)}
.check-result.fail{border-color:var(--red-glow)}
.check-result h3{font-size:1.2em;margin-bottom:8px}
.check-result.success h3{color:var(--green-glow)}
.check-result.fail h3{color:var(--red-glow)}
.check-result p{color:var(--text);line-height:1.6}
.menu-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.menu-btn{flex:1;min-width:80px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9em;cursor:pointer;transition:all .3s;text-align:center}
.menu-btn:hover{background:var(--surface2);border-color:var(--cyan)}
.menu-btn.active{background:var(--surface2);border-color:var(--cyan-glow);color:var(--cyan-glow)}
.daily-panel,.talk-panel,.save-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.daily-panel h3,.talk-panel h3,.save-panel h3{color:var(--text-bright);margin-bottom:16px;font-size:1.1em}
.daily-btn{display:block;width:100%;padding:12px 16px;margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.95em;text-align:left;cursor:pointer;transition:all .3s}
.daily-btn:hover{border-color:var(--green-glow);background:rgba(39,174,96,0.05)}
.daily-btn .effect{font-size:.8em;color:var(--text-dim);margin-top:4px}
.npc-list{display:flex;flex-direction:column;gap:12px}
.npc-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .3s}
.npc-card:hover{border-color:var(--purple-glow)}
.npc-name{color:var(--text-bright);font-size:1.05em;font-weight:bold}
.npc-role{color:var(--text-dim);font-size:.85em;margin-top:2px}
.npc-rel{color:var(--purple-glow);font-size:.85em;margin-top:4px}
.npc-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;animation:fadeIn .3s}
.npc-panel h3{color:var(--text-bright);margin-bottom:12px}
.dialogue-box{background:var(--surface2);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.dialogue-speaker{color:var(--purple-glow);font-weight:bold;margin-bottom:8px}
.dialogue-text{color:var(--text);line-height:1.7;font-style:italic}
.dialogue-choices{display:flex;flex-direction:column;gap:8px}
.dialogue-choice{padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;transition:all .3s;font-size:.9em}
.dialogue-choice:hover{border-color:var(--purple-glow);background:rgba(142,68,173,0.05)}
.save-slot{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.save-slot .info{flex:1}
.save-slot .name{color:var(--text-bright);font-weight:bold}
.save-slot .detail{color:var(--text-dim);font-size:.85em;margin-top:2px}
.save-slot .actions{display:flex;gap:6px}
.slot-btn{padding:6px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:.85em;transition:all .2s}
.slot-btn:hover{border-color:var(--cyan-glow);color:var(--cyan-glow)}
.slot-btn.danger:hover{border-color:var(--red-glow);color:var(--red-glow)}
.ending-screen{text-align:center;padding:40px 20px;animation:fadeIn 1s}
.ending-screen h1{font-size:2em;margin-bottom:20px}
.ending-screen.perfect h1{color:var(--green-glow)}
.ending-screen.normal h1{color:var(--yellow-glow)}
.ending-screen.bad h1{color:var(--red-glow)}
.ending-screen.death h1{color:var(--red-glow)}
.ending-screen p{color:var(--text);line-height:1.8;margin-bottom:12px;font-size:1.05em}
.ending-stats{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:20px 0;text-align:left}
.ending-stats .stat-line{padding:4px 0;color:var(--text);font-size:.95em}
.restart-btn{display:inline-block;margin-top:20px;padding:12px 40px;background:var(--red);border:none;border-radius:var(--radius);color:#fff;font-size:1.05em;cursor:pointer;transition:all .3s}
.restart-btn:hover{background:var(--red-glow);transform:translateY(-2px)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--green-glow);color:var(--green-glow);padding:10px 20px;border-radius:var(--radius);z-index:999;animation:slideIn .3s;font-size:.9em}
.toast.error{border-color:var(--red-glow);color:var(--red-glow)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.skip-btn{display:block;margin:0 auto 12px;padding:6px 16px;background:transparent;border:1px solid var(--text-dim);border-radius:4px;color:var(--text-dim);cursor:pointer;font-size:.85em}
.skip-btn:hover{border-color:var(--text);color:var(--text)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ==================== STORY DATA (injected below) ====================
const STORY = {
    "characters":  [
                       {
                           "id":  "ice_gas",
                           "name":  "冰燃气",
                           "type":  "均衡型",
                           "desc":  "没有明显短板，也没有突出优势。属性增益x0.5。适合第一次游玩。",
                           "intelligence":  3,
                           "physical":  3,
                           "presence":  3,
                           "luck":  3,
                           "hp":  10
                       },
                       {
                           "id":  "steam",
                           "name":  "水蒸气",
                           "type":  "能力型",
                           "desc":  "智力和体能出众，但存在感低、运气差。属性增益x1.0。适合正面硬刚。",
                           "intelligence":  4,
                           "physical":  4,
                           "presence":  2,
                           "luck":  2,
                           "hp":  10
                       },
                       {
                           "id":  "coal_gas",
                           "name":  "小煤气",
                           "type":  "命运型",
                           "desc":  "运气和存在感拉满，但智力和体能是短板。属性增益x随机(0.1~0.8)。高风险高回报。",
                           "intelligence":  2,
                           "physical":  2,
                           "presence":  4,
                           "luck":  4,
                           "hp":  10
                       }
                   ],
    "npcs":  [
                 {
                     "id":  "bisheng",
                     "name":  "毕盛",
                     "role":  "同班同学",
                     "dialogues":  [
                                       "江湾大学。名字好听，空气不好闻。你闻到了吗，铁锈味。下游那个造船厂飘过来的。",
                                       "造船厂那边死了人。厂里说是工伤事故，但我看现场不对劲。你方便跟我走一趟吗？",
                                       "造船厂的事了了。但我最近注意到一个人……钱承明。你有没有觉得他不太对？",
                                       "苏明整理了那些帖子的时间线。越看越不对劲。我们可能得认真对待这件事了。",
                                       "两个案子，一个学期。有时候我想，如果当初有人多走一步，结果会不会不同。"
                                   ]
                 },
                 {
                     "id":  "chen",
                     "name":  "陈探长",
                     "role":  "刑警队探长",
                     "dialogues":  [
                                       "新生？别往造船厂那边跑。那地方不太平，年年出事。",
                                       "马强的案子……上头催着结案。工伤事故。但我干了快三十年，事故和谋杀的区别还是看得出来的。",
                                       "造船厂的事，你们帮了忙。接下来的事交给警方，你们回去好好读书。",
                                       "有个学生的家长报了警。说孩子在网上发了一些让人不放心的东西。我们在了解情况。",
                                       "调查报告快出来了。有太多本该被注意到的信号。这不光是那一个人的问题。"
                                   ]
                 },
                 {
                     "id":  "qian",
                     "name":  "老钱",
                     "role":  "船厂老工人",
                     "dialogues":  [
                                       "学生？不该来这儿。这厂子里什么都有，就是没有干净东西。水里的鱼你看过没，形状都不对。",
                                       "马强啊……好人。前阵子老往环保局跑，说是要告厂里排污。然后人就没了。你说巧不巧。",
                                       "钱刚那个人……以前赌博输得底朝天。最近突然阔了，新车都开上了。你自个儿琢磨吧。",
                                       "那天夜里我在四号库房值班。听见动静走过去……看见了。钱刚从马强旁边站起来，手里有根管子。我蹲在库房里蹲到天亮。",
                                       "该说的都跟警察说了。三十年了，这厂子总算有人管了。马强要是能看到就好了。"
                                   ]
                 },
                 {
                     "id":  "sun",
                     "name":  "孙老师",
                     "role":  "班主任",
                     "dialogues":  [
                                       "我是你们的班主任孙文远。有什么生活上的、学习上的事都可以来找我。别客气，我办公室的门常开着。",
                                       "最近有个学生的状态让我放心不下。具体情况不方便多说，但你们如果注意到什么，可以跟我讲讲。",
                                       "我跟学生处那边提过了。但你们也知道，学校的流程……一份报告要走好几天。有时候几天就误了事。",
                                       "出事以后我老在想一个问题：如果当时我再催一催，再打个电话，会不会不一样。",
                                       "你们做得比很多大人都多。这不是夸奖，这是让人难受的事实。"
                                   ]
                 },
                 {
                     "id":  "suming",
                     "name":  "苏明",
                     "role":  "毕盛的助手",
                     "dialogues":  [
                                       "我叫苏明，帮毕盛跑跑腿、查查资料。他负责想，我负责找。你在的话正好，人多力量大。",
                                       "造船厂的工商登记我拉出来了。你猜怎么着，厂长的弟弟名下还有一家环保公司。这关系有意思。",
                                       "我注意到那个钱承明。他在论坛上的帖子越来越不对。我做了一份时间线，你们看看。",
                                       "那天的事之后……我把所有材料重新理了一遍。有好几个节点，如果当时有人拉他一把……",
                                       "毕盛说以后要读犯罪学。我大概会跟他一起吧。这次的经历不能就这么算了。"
                                   ]
                 }
             ],
    "chapters":  [
                     {
                         "id":  "ch1",
                         "name":  "第一章：入学",
                         "startEvent":  "ch1_arrival",
                         "events":  {
                                        "ch1_arrival":  {
                                                            "title":  "踏入江湾",
                                                            "desc":  "九月。火车站出口的热浪裹着柴油味扑过来。\n\n一辆大巴停在路边，车头挂着「江湾大学迎新」的横幅，红布已经被太阳晒得褪了色。你拖着行李箱上了车，找了个靠窗的位置坐下。\n\n大巴沿江边公路开了四十分钟。窗外一条宽阔的大江泛着金属光泽。下游方向，龙门吊和船体骨架的轮廓在热气中微微发颤——那是一座造船厂。\n\n一个男生挤到你旁边坐下。他瘦高个子，戴黑框眼镜，一直在低头写什么东西。\n\n「我叫毕盛。」他头也不抬地说。「看到那个造船厂了吗？永丰造船厂。听说过一些事。」\n\n他把笔记本合上，没再多说。\n\n大巴驶入校园。绿树掩映中的红砖老楼，远处传来江水拍岸的闷响。",
                                                            "choices":  [
                                                                            {
                                                                                "text":  "问毕盛他听说了什么",
                                                                                "next":  "ch1_ceremony",
                                                                                "hpDelta":  0,
                                                                                "npcDelta":  {
                                                                                                 "毕盛":  1
                                                                                             }
                                                                            },
                                                                            {
                                                                                "text":  "没接话，转头看窗外的校园",
                                                                                "next":  "ch1_ceremony",
                                                                                "hpDelta":  0,
                                                                                "statDelta":  {
                                                                                                  "presence":  1
                                                                                              }
                                                                            }
                                                                        ]
                                                        },
                                        "ch1_ceremony":  {
                                                             "title":  "开学典礼",
                                                             "desc":  "大礼堂座无虚席，头顶的风扇转得嗡嗡响。\n\n校长站在台上念欢迎辞，声音平稳得像在念天气预报。中间停了一下，说了句「我们也经历过一些遗憾」，然后继续往下念。\n\n你注意到毕盛在本子上记了几个字。\n\n典礼散场后人群涌向四面八方。毕盛走过来，压低声音：「造船厂那边我准备去看看。你下午有事吗？」\n\n你还没来得及回答，一个中年男人从礼堂侧门走出来，胸牌上写着「孙文远 班主任」。他冲新生们点了点头，目光在你们身上停了一瞬。\n\n旁边有个高个男生在发迎新传单，动作很利索。他冲你笑了一下：「同学你好，我叫苏明。有什么不清楚的可以问我。」",

                                                              "desc":  "实验楼后面。毕盛蹲在旧仓库旁边的灌木丛后面，脸色发白。\n\n「锁被撬了。」他指着门。「新的断线钳痕迹。」\n\n你透过门缝往里看。堆满了废旧课桌椅。角落里一个帆布包，鼓鼓囊囊的。\n\n毕盛掏出手机准备报警。\n\n就在这时——\n\n一声闷响。不是从仓库里传来的。是从远处。东教学楼的方向。\n\n然后是第二声。第三声。\n\n毕盛的手机从手里滑落了半寸，他一把攥住。\n\n校园广播在几秒后响了。播音员的声音在发抖：「紧急通知——校园内发现持枪人员——请所有师生立即就地躲避——这不是演习——」",

                                                           "desc":  "特警进了校园。你从躲的地方被疏散出来时，阳光刺得睁不开眼。\n\n操场上的景象——地上有血迹，东教学楼几扇窗户碎了，草地上散落着书包和鞋子。\n\n集合点你找到了毕盛。他脸色灰白，看到你的那一刻眼眶红了。但什么都没说。就站了一会儿。\n\n陈探长也在。穿着防弹背心，在指挥疏散。他走过来，声音哑了：\n\n「钱承明在西教学楼被特警击毙。初步统计……东楼和西楼都有伤亡。数字还在确认。」\n\n他看了你们一眼：「你们之前提供的那些东西——时间线、日记、帖子——都记录在案了。调查委员会需要你们的证词。」\n\n他走了。走了两步又停下来，没回头：「活着就好。」",

                                                                    "desc":  "下午。校园里到处是警车的红蓝灯光。救护车的声音几乎没停过。\n\n你坐在体育馆里——临时征用的安置点。周围是惊魂未定的人。有人抱着彼此，有人呆呆盯着地面。\n\n傍晚，校长的声音从广播里传出来。他在念一份声明。声音是平的，但你能听出来那种平是硬撑出来的。\n\n「今天上午，我校发生严重暴力事件。一名学生持枪在东教学楼和西教学楼实施袭击。嫌疑人已被警方击毙。伤亡情况正在确认。」\n\n体育馆里没人说话。\n\n然后有人开始哭。然后更多人哭了。\n\n毕盛坐在你旁边。他的笔记本摊开在膝盖上，但一个字也没有。\n\n那天终于结束了。但它留下的一切，才刚开始。",

                                                                  "desc":  "一周后上级部门成立了独立调查委员会。\n\n陈探长参与调查。他私下告诉你们一些初步发现：\n\n「钱承明的做法——两栋楼、分阶段、事先藏弹药——不是临时起意。他准备了很久。」\n\n「枪是通过非法渠道买的半自动手枪。来源在追查。」\n\n「最重要的一条——」他停了一下。「调查发现至少六个不同的环节掌握了钱承明的危险信号。心理测评、家人报警、任课老师反映、论坛管理、保卫处、学生处。六个。没有一个真正推动了行动。」\n\n苏明在旁边轻声说了一句：「六个系统。全部失灵。」",

// ==================== GAME STATE ====================
let state = {};

// ==================== UTILITY ====================
function getStatName(s) { return {intelligence:'智力',physical:'体能',presence:'存在感',luck:'运气'}[s]||s; }
function getStatValue(s) { return {intelligence:state.player.intelligence,physical:state.player.physical,presence:state.player.presence,luck:state.player.luck}[s]||0; }

// v5.0: Weighted stat multiplier per character type
function getStatMultiplier() {
  const t = state.player.type;
  if (t === '均衡型') return 0.5;
  if (t === '能力型') return 1.0;
  if (t === '命运型') return 0.1 + Math.floor(Math.random()*8)*0.1; // 0.1~0.8
  return 1.0;
}

// v5.0: Apply stat change with multiplier + cap at 5
function applyStatChange(stat, rawDelta) {
  const mult = getStatMultiplier();
  let actual = Math.floor(rawDelta * mult);
  if (actual === 0 && rawDelta !== 0 && mult > 0) actual = 1; // floor guarantee
  const before = state.player[stat];
  state.player[stat] = Math.min(5, Math.max(0, state.player[stat] + actual));
  const changed = state.player[stat] - before;
  return { actual: changed, raw: rawDelta, mult: mult };
}

function showToast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ==================== RENDERING ====================
function render() {
  const app = document.getElementById('app');
  if (!state.screen || state.screen === 'title') { renderTitle(); return; }
  if (state.screen === 'charSelect') { renderCharSelect(); return; }
  if (state.screen === 'ending') { renderEnding(); return; }
  if (state.screen === 'game') { renderGame(); return; }
}

function renderTitle() {
  document.getElementById('app').innerHTML = `
    <div class="title-screen">
      <h1>侦探生存模拟器</h1>
      <div class="subtitle">DETECTIVE SURVIVAL SIMULATOR v5.0</div>
      <button class="title-btn primary" onclick="startNewGame()">开始新游戏</button>
      <button class="title-btn" onclick="loadGame()">读取存档</button>
    </div>`;
}

function renderCharSelect() {
  let html = '<div class="char-select"><h2>选择你的角色</h2>';
  STORY.characters.forEach((c,i) => {
    const sel = state.selectedChar === i ? ' selected' : '';
    html += `<div class="char-card${sel}" onclick="selectChar(${i})">
      <div class="char-name">${c.name}</div>
      <div class="char-type">${c.type}</div>
      <div class="char-desc">${c.desc}</div>
      <div class="stat-row">
        <span class="stat-badge int"><span class="label">智力</span><span class="val">${c.intelligence}</span></span>
        <span class="stat-badge phy"><span class="label">体能</span><span class="val">${c.physical}</span></span>
        <span class="stat-badge pres"><span class="label">存在感</span><span class="val">${c.presence}</span></span>
        <span class="stat-badge luck"><span class="label">运气</span><span class="val">${c.luck}</span></span>
        <span class="stat-badge hp"><span class="label">HP</span><span class="val">${c.hp}</span></span>
      </div></div>`;
  });
  html += `<button class="confirm-btn${state.selectedChar!==null?' active':''}" onclick="confirmChar()">确认选择</button></div>`;
  document.getElementById('app').innerHTML = html;
}

function renderGame() {
  const p = state.player;
  const ch = STORY.chapters[state.chapterIndex];
  const ev = ch ? ch.events[state.currentEventId] : null;
  const hpPct = (p.hp / p.maxHp * 100).toFixed(0);

  let html = `<div class="game-layout">
    <div class="stats-panel">
      <div><span class="player-name">${p.name}</span> <span style="color:var(--cyan-glow);font-size:.8em">(${p.type})</span></div>
      <div class="hp-bar-container"><div class="hp-bar"><div class="hp-bar-fill" style="width:${hpPct}%"></div></div><span class="hp-text">${p.hp}/${p.maxHp}</span></div>
      <div class="mini-stats">
        <span class="mini-stat"><span class="l">智力</span><span class="v">${p.intelligence}/5</span></span>
        <span class="mini-stat"><span class="l">体能</span><span class="v">${p.physical}/5</span></span>
        <span class="mini-stat"><span class="l">存在感</span><span class="v">${p.presence}/5</span></span>
        <span class="mini-stat"><span class="l">运气</span><span class="v">${p.luck}/5</span></span>
      </div>
    </div>`;

  if (ch) html += `<div class="chapter-title"><h2>${ch.name}</h2></div>`;

  // Notifications
  state.notifications.forEach(n => {
    if (n.type === 'clue') html += `<div class="clue-popup"><span class="icon">&#128269;</span><span class="text">${n.text}</span></div>`;
    else html += `<div class="stat-change${n.type==='statDown'?' negative':''}">${n.text}</div>`;
  });

  // Tab content
  if (state.menuTab === 'event') html += renderEventTab(ev);
  else if (state.menuTab === 'daily') html += renderDailyTab();
  else if (state.menuTab === 'talk') html += renderTalkTab();
  else if (state.menuTab === 'save') html += renderSaveTab();

  // Menu bar
  html += `<div class="menu-bar">
    <button class="menu-btn${state.menuTab==='event'?' active':''}" onclick="switchTab('event')">事件</button>
    <button class="menu-btn${state.menuTab==='daily'?' active':''}" onclick="switchTab('daily')">日常</button>
    <button class="menu-btn${state.menuTab==='talk'?' active':''}" onclick="switchTab('talk')">交流</button>
    <button class="menu-btn${state.menuTab==='save'?' active':''}" onclick="switchTab('save')">存档</button>
    <button class="menu-btn" onclick="backToTitle()">主菜单</button>
  </div></div>`;

  document.getElementById('app').innerHTML = html;
}

function renderEventTab(ev) {
  if (!ev) return '<div class="story-panel"><p class="story-text">章节加载中...</p></div>';
  let html = '<div class="story-panel">';
  if (ev.title) html += `<div class="story-title">${ev.title}</div>`;

  if (state.typing) {
    html += `<p class="story-text typing">${state.typingText}</p>`;
    html += `<button class="skip-btn" onclick="skipTyping()">跳过动画</button>`;
  } else {
    html += `<p class="story-text">${ev.desc}</p>`;
    // Choices
    if (ev.choices && ev.choices.length > 0) {
      html += '<div class="choices">';
      ev.choices.forEach((c,i) => {
        let locked = false, reqText = '';
        if (c.requireStat) {
          const pv = getStatValue(c.requireStat.stat);
          const ok = pv >= c.requireStat.value;
          if (!ok) locked = true;
          reqText = `${getStatName(c.requireStat.stat)} >= ${c.requireStat.value} (你: ${pv})`;
        }
        html += `<button class="choice-btn${locked?' locked':''}" ${locked?'disabled':''} onclick="makeChoice(${i})">
          ${c.text}
          ${reqText ? `<span class="req${locked?' fail':''}">${reqText}</span>` : ''}
        </button>`;
      });
      html += '</div>';
    } else {
      html += `<button class="choice-btn" onclick="showEnding()">查看结局</button>`;
    }
  }

  // Check result overlay
  if (state.checkResult) {
    const cr = state.checkResult;
    html += `<div class="check-result ${cr.success?'success':'fail'}">
      <h3>${cr.success ? '检定成功！' : '检定失败！'}</h3>
      <p>${cr.desc || ''}</p>
      <button class="choice-btn" style="margin-top:12px" onclick="dismissCheck()">继续</button>
    </div>`;
  }

  html += '</div>';
  return html;
}

function renderDailyTab() {
  return `<div class="daily-panel"><h3>日常活动</h3>
    <button class="daily-btn" onclick="doDaily('study')">去上课<div class="effect">智力+1, HP-1</div></button>
    <button class="daily-btn" onclick="doDaily('gym')">去健身房<div class="effect">体能+1, HP-1</div></button>
    <button class="daily-btn" onclick="doDaily('social')">社交活动<div class="effect">存在感+1, HP-1</div></button>
    <button class="daily-btn" onclick="doDaily('rest')">休息<div class="effect">HP+2</div></button>
  </div>`;
}

function renderTalkTab() {
  let html = '<div class="talk-panel"><h3>交流</h3><div class="npc-list">';
  STORY.npcs.forEach((npc,i) => {
    const rel = state.npcRelations[npc.name] || 0;
    html += `<div class="npc-card" onclick="talkToNPC(${i})">
      <div class="npc-name">${npc.name}</div>
      <div class="npc-role">${npc.role}</div>
      <div class="npc-rel">好感度: ${rel}</div>
    </div>`;
  });
  html += '</div></div>';
  return html;
}

function renderSaveTab() {
  let html = '<div class="save-panel"><h3>存档管理</h3>';
  for (let i = 1; i <= 3; i++) {
    const info = getSaveSlotInfo(i);
    if (info) {
      html += `<div class="save-slot">
        <div class="info"><div class="name">槽位${i}: ${info.playerName} (${info.playerType})</div>
        <div class="detail">HP:${info.hp} | ${info.chapterName} | ${info.timestamp}</div></div>
        <div class="actions">
          <button class="slot-btn" onclick="overwriteSlot(${i})">覆盖</button>
          <button class="slot-btn" onclick="loadSlot(${i})">读取</button>
          <button class="slot-btn danger" onclick="deleteSlot(${i})">删除</button>
        </div></div>`;
    } else {
      html += `<div class="save-slot"><div class="info"><div class="name">槽位${i}: (空)</div></div>
        <div class="actions"><button class="slot-btn" onclick="saveToSlot(${i})">保存</button></div></div>`;
    }
  }
  html += `<div style="margin-top:8px;color:var(--text-dim);font-size:.85em">已收集线索: ${state.clues.length} 条</div>`;
  if (state.clues.length > 0) {
    html += '<div style="margin-top:8px;max-height:200px;overflow-y:auto">';
    state.clues.forEach(c => { html += `<div style="padding:4px 0;font-size:.85em;color:var(--yellow-glow)">- ${c}</div>`; });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderEnding() {
  const p = state.player;
  const clues = state.clues.length;
  let type, title, lines;

  if (state.endingType === 'death') {
    type = 'death'; title = '游戏结束';
    lines = [`${p.name} 的生命值降到了零……`, '造船厂的真相和校园的信号，都永远沉没了。'];
  } else if (clues >= 15 && p.hp >= 5) {
    type = 'perfect'; title = '完美结局：看见信号的人';
    lines = ['你收集了足够的线索，揭开了造船厂的真相，也在枪击案发生前尽了一切努力。',
             `${p.name} 和毕盛的故事被写进了调查报告。`, '有些信号终于被看见了。'];
  } else if (clues >= 8) {
    type = 'normal'; title = '普通结局：拼凑了一半的拼图';
    lines = ['你发现了一些真相，但还有很多信号被遗漏了。', '造船厂或校园——至少有一个留下了遗憾。'];
  } else {
    type = 'bad'; title = '遗憾结局：被忽视的信号';
    lines = ['太多的线索从你指尖滑过。真相依然隐藏在迷雾中。', '信号一直在那里——只是没有人去看见。'];
  }

  let html = `<div class="ending-screen ${type}"><h1>${title}</h1>`;
  lines.forEach(l => { html += `<p>${l}</p>`; });
  html += `<div class="ending-stats">
    <div class="stat-line">收集线索: ${clues} 条</div>
    <div class="stat-line">最终HP: ${p.hp}/${p.maxHp}</div>
    <div class="stat-line">智力: ${p.intelligence}/5  体能: ${p.physical}/5  存在感: ${p.presence}/5  运气: ${p.luck}/5</div>
  </div>
  <button class="restart-btn" onclick="startNewGame()">重新开始</button>
  <button class="restart-btn" style="background:var(--surface);border:1px solid var(--border);margin-left:8px" onclick="state={};render()">返回标题</button>
  </div>`;
  document.getElementById('app').innerHTML = html;
}

// ==================== GAME LOGIC ====================
function startNewGame() {
  state = { screen:'charSelect', player:null, chapterIndex:0, currentEventId:null, clues:[], npcRelations:{}, menuTab:'event', typing:false, typingText:'', typingIndex:0, notifications:[], checkResult:null, selectedChar:null, endingType:null };
  render();
}

function selectChar(i) { state.selectedChar = i; render(); }

function confirmChar() {
  if (state.selectedChar === null) return;
  const c = STORY.characters[state.selectedChar];
  state.player = { ...c, maxHp: c.hp };
  state.chapterIndex = 0;
  state.currentEventId = STORY.chapters[0].startEvent;
  state.screen = 'game';
  state.menuTab = 'event';
  startTypingEvent();
}

function startTypingEvent() {
  const ch = STORY.chapters[state.chapterIndex];
  if (!ch) { showEnding(); return; }
  const ev = ch.events[state.currentEventId];
  if (!ev) { showEnding(); return; }
  state.notifications = [];
  state.typing = true;
  state.typingText = '';
  state.typingIndex = 0;
  render();
  const fullText = ev.desc;
  state._typingInterval = setInterval(() => {
    if (state.typingIndex < fullText.length) {
      state.typingText += fullText[state.typingIndex];
      state.typingIndex++;
      const el = document.querySelector('.story-text');
      if (el) el.textContent = state.typingText;
    } else {
      clearInterval(state._typingInterval);
      state.typing = false;
      render();
    }
  }, 20);
}

function skipTyping() {
  if (state._typingInterval) clearInterval(state._typingInterval);
  state.typing = false;
  render();
}

function makeChoice(index) {
  const ch = STORY.chapters[state.chapterIndex];
  const ev = ch.events[state.currentEventId];
  const choice = ev.choices[index];
  state.notifications = [];

  // HP
  if (choice.hpDelta) {
    state.player.hp = Math.max(0, Math.min(state.player.maxHp, state.player.hp + choice.hpDelta));
    state.notifications.push({type: choice.hpDelta>0?'statUp':'statDown', text:`HP ${choice.hpDelta>0?'+':''}${choice.hpDelta} (${state.player.hp}/${state.player.maxHp})`});
  }

  // v5.0: Stat changes with weighted multiplier + cap at 5
  if (choice.statDelta) {
    for (const [stat, raw] of Object.entries(choice.statDelta)) {
      const r = applyStatChange(stat, raw);
      if (r.actual !== 0) {
        let txt = `${getStatName(stat)} ${r.actual>0?'+':''}${r.actual}`;
        if (r.actual !== raw) txt += ` (原始${raw>0?'+':''}${raw}, 加权x${r.mult.toFixed(1)})`;
        txt += ` -> ${state.player[stat]}/5`;
        state.notifications.push({type: r.actual>0?'statUp':'statDown', text: txt});
      } else {
        state.notifications.push({type:'statDown', text:`${getStatName(stat)} 无变化 (已到上限5)`});
      }
    }
  }

  // Clue
  if (choice.clue && !state.clues.includes(choice.clue)) {
    state.clues.push(choice.clue);
    state.notifications.push({type:'clue', text: choice.clue});
  }

  // NPC relations
  if (choice.npcDelta) {
    for (const [npc, delta] of Object.entries(choice.npcDelta)) {
      state.npcRelations[npc] = (state.npcRelations[npc] || 0) + delta;
    }
  }

  // Death check
  if (state.player.hp <= 0) { state.endingType = 'death'; state.screen = 'ending'; render(); return; }

  // Stat check
  if (choice.check) {
    const pv = getStatValue(choice.check.stat);
    const bonus = state.player.luck >= 4 ? 1.2 : 1.0;
    const effective = pv * bonus;
    const success = effective >= choice.check.value;
    state.checkResult = {
      success,
      desc: success ? (choice.successDesc||'') : (choice.failDesc||''),
      next: success ? choice.successNext : choice.failNext,
      failHpDelta: choice.failHpDelta || 0
    };
    render();
    return;
  }

  navigateTo(choice.next);
}

function performCheck(choice) { /* handled inline in makeChoice */ }

function dismissCheck() {
  const cr = state.checkResult;
  if (!cr) return;
  if (!cr.success && cr.failHpDelta) {
    state.player.hp = Math.max(0, state.player.hp + cr.failHpDelta);
    state.notifications.push({type:'statDown', text:`HP ${cr.failHpDelta} (${state.player.hp}/${state.player.maxHp})`});
    if (state.player.hp <= 0) { state.endingType = 'death'; state.screen = 'ending'; render(); return; }
  }
  state.checkResult = null;
  navigateTo(cr.next);
}

function navigateTo(next) {
  if (!next || next === '__NEXT_CHAPTER__') { advanceChapter(); return; }
  if (next === '__GAME_OVER__') { state.endingType = 'death'; state.screen = 'ending'; render(); return; }
  state.currentEventId = next;
  state.menuTab = 'event';
  startTypingEvent();
}

function advanceChapter() {
  state.chapterIndex++;
  if (state.chapterIndex < STORY.chapters.length) {
    state.currentEventId = STORY.chapters[state.chapterIndex].startEvent;
    state.menuTab = 'event';
    state.notifications.push({type:'statUp', text:`进入 ${STORY.chapters[state.chapterIndex].name}`});
    startTypingEvent();
  } else { showEnding(); }
}

function showEnding() { state.endingType = 'complete'; state.screen = 'ending'; render(); }
function switchTab(tab) { state.menuTab = tab; state.notifications = []; render(); }

// v5.0: Daily activities with stat cap at 5
function doDaily(action) {
  const p = state.player;
  state.notifications = [];
  let r;
  switch(action) {
    case 'study':
      r = applyStatChange('intelligence', 1);
      p.hp = Math.max(0, p.hp - 1);
      state.notifications.push({type:'statUp',text:`智力 ${r.actual>0?'+':''}${r.actual}${r.actual!==1?' (加权x'+r.mult.toFixed(1)+')':''} -> ${p.intelligence}/5`});
      state.notifications.push({type:'statDown',text:`HP -1 (${p.hp}/${p.maxHp})`});
      break;
    case 'gym':
      r = applyStatChange('physical', 1);
      p.hp = Math.max(0, p.hp - 1);
      state.notifications.push({type:'statUp',text:`体能 ${r.actual>0?'+':''}${r.actual}${r.actual!==1?' (加权x'+r.mult.toFixed(1)+')':''} -> ${p.physical}/5`});
      state.notifications.push({type:'statDown',text:`HP -1 (${p.hp}/${p.maxHp})`});
      break;
    case 'social':
      r = applyStatChange('presence', 1);
      p.hp = Math.max(0, p.hp - 1);
      state.notifications.push({type:'statUp',text:`存在感 ${r.actual>0?'+':''}${r.actual}${r.actual!==1?' (加权x'+r.mult.toFixed(1)+')':''} -> ${p.presence}/5`});
      state.notifications.push({type:'statDown',text:`HP -1 (${p.hp}/${p.maxHp})`});
      break;
    case 'rest':
      p.hp = Math.min(p.maxHp, p.hp + 2);
      state.notifications.push({type:'statUp',text:`HP +2 (${p.hp}/${p.maxHp})`});
      break;
  }
  if (p.presence >= 4 && Math.random() < 0.3) {
    p.hp = Math.max(0, p.hp - 1);
    state.notifications.push({type:'clue',text:'你的高存在感引起了某些人的注意……HP-1'});
  }
  if (p.hp <= 0) { state.endingType = 'death'; state.screen = 'ending'; }
  render();
}

function talkToNPC(index) {
  const npc = STORY.npcs[index];
  const rel = state.npcRelations[npc.name] || 0;
  const idx = Math.min(Math.max(0, rel), npc.dialogues.length - 1);
  const html = `<div class="npc-panel"><h3>&#128172; 与 ${npc.name} (${npc.role}) 对话</h3>
    <div class="dialogue-box"><div class="dialogue-speaker">${npc.name}:</div>
    <div class="dialogue-text">"${npc.dialogues[idx]}"</div></div>
    <div class="dialogue-choices">
      <button class="dialogue-choice" onclick="npcRespond('${npc.name}',1)">友好回应 (好感度+1)</button>
      <button class="dialogue-choice" onclick="npcRespond('${npc.name}',0)">冷淡回应</button>
      <button class="dialogue-choice" onclick="npcRespond('${npc.name}',-1)">追问细节 (好感度-1)</button>
    </div></div>`;
  const panel = document.querySelector('.talk-panel');
  if (panel) panel.outerHTML = html;
}

function npcRespond(name, delta) {
  state.npcRelations[name] = (state.npcRelations[name] || 0) + delta;
  state.notifications = [];
  if (delta === 1) state.notifications.push({type:'statUp',text:`${name} 对你的态度更友好了`});
  else if (delta === -1) {
    const rel = state.npcRelations[name] || 0;
    if (rel >= 2) {
      const clue = `${name}的秘密线索`;
      if (!state.clues.includes(clue)) { state.clues.push(clue); state.notifications.push({type:'clue',text:`${name} 告诉了你一些重要的事情！`}); }
    } else state.notifications.push({type:'statDown',text:`${name} 不太想告诉你更多。`});
  } else state.notifications.push({type:'statUp',text:'你礼貌地回应了。'});
  render();
}

// ==================== SAVE SYSTEM ====================
const SAVE_PREFIX = 'detective_save_slot_';
function getSaveSlotInfo(n) {
  try { const d = JSON.parse(localStorage.getItem(SAVE_PREFIX+n)); if(!d) return null;
    return { playerName:d.player.name, playerType:d.player.type, hp:d.player.hp, chapterName: STORY.chapters[d.chapterIndex]?STORY.chapters[d.chapterIndex].name:'未知', timestamp:d.timestamp };
  } catch(e) { return null; }
}
function saveToSlot(n) {
  const data = { player:{...state.player}, chapterIndex:state.chapterIndex, currentEventId:state.currentEventId, clues:[...state.clues], npcRelations:{...state.npcRelations}, timestamp: new Date().toLocaleString('zh-CN') };
  localStorage.setItem(SAVE_PREFIX+n, JSON.stringify(data));
  showToast('保存到槽位'+n);
  render();
}
function overwriteSlot(n) { if(confirm('覆盖槽位'+n+'？')) saveToSlot(n); }
function loadSlot(n) {
  try { const d = JSON.parse(localStorage.getItem(SAVE_PREFIX+n)); if(!d) return;
    state.player = {...d.player}; state.chapterIndex = d.chapterIndex; state.currentEventId = d.currentEventId;
    state.clues = d.clues||[]; state.npcRelations = d.npcRelations||{};
    state.screen = 'game'; state.menuTab = 'event'; state.notifications = [];
    showToast('读取成功'); startTypingEvent();
  } catch(e) { showToast('读取失败',true); }
}
function deleteSlot(n) {
  if(confirm('删除槽位'+n+'？')) { localStorage.removeItem(SAVE_PREFIX+n); showToast('已删除'); render(); }
}
function loadGame() {
  let html = '<div class="save-panel"><h3>读取存档</h3>';
  let hasAny = false;
  for (let i=1;i<=3;i++) { const info = getSaveSlotInfo(i);
    if (info) { hasAny = true;
      html += `<div class="save-slot"><div class="info"><div class="name">槽位${i}: ${info.playerName} (${info.playerType})</div>
        <div class="detail">HP:${info.hp} | ${info.chapterName} | ${info.timestamp}</div></div>
        <div class="actions"><button class="slot-btn" onclick="loadSlot(${i})">读取</button>
        <button class="slot-btn danger" onclick="deleteSlotFromTitle(${i})">删除</button></div></div>`;
    } else html += `<div class="save-slot"><div class="info"><div class="name">槽位${i}: (空)</div></div></div>`;
  }
  html += `<button class="choice-btn" style="margin-top:12px" onclick="render()">返回</button></div>`;
  document.getElementById('app').innerHTML = html;
}
function deleteSlotFromTitle(n) { if(confirm('删除槽位'+n+'？')){ localStorage.removeItem(SAVE_PREFIX+n); loadGame(); } }
function backToTitle() { saveToSlot(1); state={screen:'title'}; render(); }

// ==================== INIT ====================
render();

</script>
